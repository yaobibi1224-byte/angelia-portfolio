    .stats-wrap { padding: 60px 24px; }
    #stats-grid { grid-template-columns: repeat(2,1fr); }
    .stat-item { border-right: none; border-bottom: 1px solid rgba(139,92,246,0.1); padding: 28px 20px; }
    .skills-wrap { padding: 80px 24px; }
    #skills-grid { grid-template-columns: 1fr; }
    .proj-inner { grid-template-columns: 1fr; }
    .contact-wrap { padding: 80px 24px; }
    .contact-footer { flex-direction: column; gap: 16px; align-items: flex-start; }
    .blob { display: none; }
  }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav>
  <div id="nav-logo"></div>
  <a id="nav-contact" href="#"></a>
</nav>

<section class="hero">
  <div class="deco-ring deco-ring-1"></div>
  <div class="deco-ring deco-ring-2"></div>
  <div id="hero-tag"></div>
  <h1 id="hero-name"></h1>
  <div class="hero-bottom">
    <p id="hero-bio"></p>
    <div id="hero-tags"></div>
  </div>
  <div class="scroll-hint">SCROLL TO EXPLORE</div>
</section>

<div class="marquee-wrap">
  <div class="marquee-track" id="marquee-track"></div>
</div>

<div class="stats-wrap reveal">
  <div id="stats-grid"></div>
</div>

<div class="skills-wrap">
  <div class="section-label">Skills & Work</div>
  <div id="skills-grid"></div>
</div>

<div class="contact-wrap reveal">
  <div class="contact-deco-1"></div>
  <div class="contact-deco-2"></div>
  <div class="contact-label-sm">Let's Work Together</div>
  <h2 id="contact-headline"></h2>
  <div class="contact-links" id="contact-links"></div>
  <div class="contact-footer">
    <div id="contact-footer-name"></div>
    <div class="contact-footer-copy">MARKETING PLANNER © 2025</div>
  </div>
</div>

<script>
/* ---- RENDER ---- */
const D = DATA;

// Nav
document.getElementById('nav-logo').textContent = D.name_en;
const nc = document.getElementById('nav-contact');
nc.href = `mailto:${D.email}`;
nc.textContent = 'Get in touch ↗';

// Hero
document.getElementById('hero-tag').textContent = D.tagline;
document.getElementById('hero-name').innerHTML = `<span class="name-en">${D.name_en.replace(' ','<br>')}</span><span class="name-zh">${D.name_zh}</span>`;
document.getElementById('hero-bio').textContent = D.bio;
document.getElementById('hero-tags').innerHTML = D.hero_tags.map(t=>`<span class="tag-pill">${t}</span>`).join('');

// Marquee (doubled for seamless loop)
const mItems = [...D.marquee,...D.marquee].map(t=>`<span class="m-item">${t}<span class="m-sep">✦</span></span>`).join('');
document.getElementById('marquee-track').innerHTML = mItems;

// Stats
document.getElementById('stats-grid').innerHTML = D.stats.map(s=>`
  <div class="stat-item">
    <div class="stat-big">${s.big}</div>
    <div class="stat-sub">${s.sub}</div>
  </div>`).join('');

// Gallery state
const gState = {};
window.slideG = (tid,did,dir) => {
  const tr=document.getElementById(tid), n=tr.querySelectorAll('.gallery-slide').length;
  gState[tid]=((gState[tid]||0)+dir+n)%n;
  tr.style.transform=`translateX(-${gState[tid]*100}%)`;
  updateDots(did,gState[tid]);
};
window.goToG = (tid,did,i) => {
  gState[tid]=i;
  document.getElementById(tid).style.transform=`translateX(-${i*100}%)`;
  updateDots(did,i);
};
function updateDots(did,active){
  document.getElementById(did)?.querySelectorAll('.gallery-dot').forEach((d,i)=>d.classList.toggle('active',i===active));
}

// Build gallery HTML
function buildGallery(photos, captions, uid) {
  if (!photos || photos.length === 0) return '';
  const tid = `gt-${uid}`, did = `gd-${uid}`;
  const slides = photos.map((p,i) => `
    <div class="gallery-slide">
      ${p ? `<img src="${p}" alt="${captions[i]||''}" onerror="this.parentElement.innerHTML='<div class=\\'gallery-placeholder\\'>${captions[i]||'照片'}</div>'">` 
          : `<div class="gallery-placeholder">📸 ${captions[i]||'照片'}</div>`}
    </div>`).join('');
  const dots = photos.map((_,i)=>`<div class="gallery-dot${i===0?' active':''}" onclick="event.stopPropagation();goToG('${tid}','${did}',${i})"></div>`).join('');
  const nav = photos.length > 1 ? `<div class="gallery-nav">
    <button class="gallery-btn" onclick="event.stopPropagation();slideG('${tid}','${did}',-1)">‹</button>
    <button class="gallery-btn" onclick="event.stopPropagation();slideG('${tid}','${did}',1)">›</button>
  </div>` : '';
  return `<div class="proj-gallery">
    <div class="gallery-label">活動現場</div>
    <div class="gallery-slider">
      <div class="gallery-track" id="${tid}">${slides}</div>${nav}
    </div>
    ${photos.length>1?`<div class="gallery-dots" id="${did}">${dots}</div>`:''}
  </div>`;
}

// Build project card
function buildProject(proj, uid) {
  const metrics = proj.metrics.map(m=>`
    <div class="metric-row">
      <span class="metric-label">${m.label}</span>
      <span class="metric-val">${m.val}</span>
    </div>`).join('');
  const tags = proj.tags.map(t=>`<span class="ptag">${t}</span>`).join('');
  const gallery = buildGallery(proj.photos, proj.photo_captions, uid);
  return `
  <div class="proj-card reveal" onclick="toggleProj(this)">
    <div class="proj-header">
      <div>
        <div class="proj-title">${proj.title}</div>
        <div class="proj-sub">${proj.sub}</div>
      </div>
      <span class="proj-type-badge">${proj.type}</span>
    </div>
    <div class="proj-body">
      <div class="proj-inner">
        <div class="proj-desc">${proj.desc}</div>
        <div class="proj-metrics">${metrics}</div>
        ${gallery}
        <div class="proj-tags">${tags}</div>
      </div>
    </div>
  </div>`;
}

// Skills grid
let projUid = 0;
document.getElementById('skills-grid').innerHTML = D.skills.map((sk,si)=>{
  const items = sk.items.map(i=>`<li>${i}</li>`).join('');
  const projects = sk.projects.map(p=>buildProject(p, `${si}-${projUid++}`)).join('');
  return `
  <div class="skill-block reveal">
    <div class="skill-header" onclick="toggleSkill(this.parentElement)">
      <div class="skill-icon">${sk.icon}</div>
      <div class="skill-name">${sk.name}</div>
      <ul class="skill-list">${items}</ul>
      <div class="skill-toggle">VIEW PROJECTS <span class="skill-toggle-arrow">›</span></div>
    </div>
    <div class="skill-projects">${projects}</div>
  </div>`;
}).join('');

// Contact
document.getElementById('contact-headline').textContent = D.contact_headline;
document.getElementById('contact-links').innerHTML = `
  <a href="mailto:${D.email}" class="contact-link">${D.email} →</a>
  <a href="tel:${D.phone.replace(/-/g,'')}" class="contact-link">${D.phone} →</a>`;
document.getElementById('contact-footer-name').textContent = `${D.name_en.toUpperCase()}｜${D.name_zh}`;

// Toggles
window.toggleSkill = (block) => {
  const isOpen = block.classList.contains('open');
  document.querySelectorAll('.skill-block.open').forEach(b=>b.classList.remove('open'));
  if(!isOpen) block.classList.add('open');
};
window.toggleProj = (card) => {
  const body = card.querySelector('.proj-body');
  const isOpen = body.classList.contains('open');
  document.querySelectorAll('.proj-body.open').forEach(b=>b.classList.remove('open'));
  if(!isOpen) body.classList.add('open');
};

// Scroll reveal
const obs = new IntersectionObserver(es=>es.forEach((e,i)=>{
  if(e.isIntersecting) setTimeout(()=>e.target.classList.add('visible'),i*60);
}),{threshold:0.06});
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));

// Cursor
const cur=document.getElementById('cursor'), ring=document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx-5+'px';cur.style.top=my-5+'px';});
(function a(){rx+=(mx-rx)*0.1;ry+=(my-ry)*0.1;ring.style.left=rx-16+'px';ring.style.top=ry-16+'px';requestAnimationFrame(a);})();
</script>
</body>
</html>
