<script>
const D = DATA;
const parts = D.name_en.split(' ');
document.getElementById('nav-logo').innerHTML = `${parts[0]} <span>${parts[1]||''}</span>`;
document.getElementById('nav-cta').href = `mailto:${D.email}`;
document.getElementById('hero-name-en').innerHTML = `${parts[0]}<span class="name-second"> ${parts[1]||''}</span>`;
document.getElementById('hero-name-zh').textContent = D.name_zh;
document.getElementById('hero-bio').textContent = D.bio;
document.getElementById('hero-tags').innerHTML = D.hero_tags.map(t=>`<span class="tag-pill">${t}</span>`).join('');

const photoEl = document.getElementById('hero-photo');
if (D.photo) {
  photoEl.innerHTML = `<img src="${D.photo}" alt="Angelia Chang">`;
} else {
  photoEl.innerHTML = `<div class="hero-photo-placeholder"><span>📸</span><span>個人照片<br>待補入</span></div>`;
}

document.getElementById('marquee-track').innerHTML = [...D.marquee,...D.marquee].map(t=>`<span class="m-item">${t}<span class="m-sep"> ★ </span></span>`).join('');

const decos = ['★','✦','✦','◆'];
document.getElementById('stats-wrap').innerHTML = D.stats.map((s,i)=>`
  <div class="stat-item reveal">
    <div class="stat-deco">${decos[i]}</div>
    <div class="stat-big">${s.big}<span class="stat-unit">${s.unit}</span></div>
    <div class="stat-sub">${s.sub}</div>
  </div>`).join('');

const totalP = D.skills.reduce((a,s)=>a+s.projects.length,0);
document.getElementById('section-count').textContent = `${D.skills.length} SKILLS · ${totalP} PROJECTS`;

const gState = {};
window.slideG=(tid,did,dir)=>{ const tr=document.getElementById(tid),n=tr.querySelectorAll('.gallery-slide').length; gState[tid]=((gState[tid]||0)+dir+n)%n; tr.style.transform=`translateX(-${gState[tid]*100}%)`; updateDots(did,gState[tid]); };
window.goToG=(tid,did,i)=>{ gState[tid]=i; document.getElementById(tid).style.transform=`translateX(-${i*100}%)`; updateDots(did,i); };
function updateDots(did,active){ document.getElementById(did)?.querySelectorAll('.gallery-dot').forEach((d,i)=>d.classList.toggle('active',i===active)); }
window.openLightbox=(src)=>{ document.getElementById('lightbox-img').src=src; document.getElementById('lightbox').classList.add('open'); };
window.closeLightbox=()=>document.getElementById('lightbox').classList.remove('open');

function buildGallery(photos,captions,uid){
  if(!photos||photos.length===0) return '';
  const tid=`gt-${uid}`,did=`gd-${uid}`;
  const slides=photos.map((p,i)=>`<div class="gallery-slide">${p?`<img src="${p}" alt="${captions[i]||''}" onclick="event.stopPropagation();openLightbox('${p}')" onerror="this.parentElement.innerHTML='<div class=\\'gallery-placeholder\\'>${captions[i]||'照片'}</div>'">`:`<div class="gallery-placeholder">📸 ${captions[i]||'照片待補'}</div>`}</div>`).join('');
  const dots=photos.map((_,i)=>`<div class="gallery-dot${i===0?' active':''}" onclick="event.stopPropagation();goToG('${tid}','${did}',${i})"></div>`).join('');
  const nav=photos.length>1?`<div class="gallery-nav"><button class="gallery-btn" onclick="event.stopPropagation();slideG('${tid}','${did}',-1)">‹</button><button class="gallery-btn" onclick="event.stopPropagation();slideG('${tid}','${did}',1)">›</button></div>`:'';
  return `<div class="proj-gallery"><div class="gallery-label">活動現場</div><div class="gallery-slider"><div class="gallery-track" id="${tid}">${slides}</div>${nav}</div>${photos.length>1?`<div class="gallery-dots" id="${did}">${dots}</div>`:''}</div>`;
}

function buildProject(proj,uid){
  const metrics=proj.metrics.map(m=>`<div class="metric-row"><span class="metric-label">${m.label}</span><span class="metric-val">${m.val}</span></div>`).join('');
  const tags=proj.tags.map(t=>`<span class="ptag">${t}</span>`).join('');
  const newsBtn=proj.news?`<a href="${proj.news}" target="_blank" class="news-btn">📰 新聞報導 →</a>`:'';
  return `<div class="proj-card reveal" onclick="toggleProj(this)"><div class="proj-header"><div><div class="proj-title">${proj.title}</div><div class="proj-sub">${proj.sub}</div></div><span class="proj-badge">${proj.type}</span></div><div class="proj-body"><div class="proj-inner"><div class="proj-desc">${proj.desc}${newsBtn?`<br><br>${newsBtn}`:''}</div><div class="proj-metrics">${metrics}</div>${buildGallery(proj.photos,proj.photo_captions,uid)}<div class="proj-tags">${tags}</div></div></div></div>`;
}

let uid=0;
document.getElementById('skills-grid').innerHTML=D.skills.map((sk,si)=>{
  const items=sk.items.map(i=>`<li>${i}</li>`).join('');
  const projects=sk.projects.map(p=>buildProject(p,`${si}-${uid++}`)).join('');
  return `<div class="skill-block color-${sk.color} reveal"><div class="skill-header-bar"></div><div class="skill-header" onclick="toggleSkill(this.parentElement)"><div class="skill-top"><div class="skill-num">${sk.num}</div><div class="skill-icon-big">${sk.icon}</div></div><div class="skill-name">${sk.name}</div><ul class="skill-list">${items}</ul><div class="skill-toggle">VIEW PROJECTS <span class="toggle-arrow">›</span></div></div><div class="skill-projects">${projects}</div></div>`;
}).join('');

document.getElementById('contact-headline').textContent = D.contact_headline;
document.getElementById('contact-links').innerHTML=`<a href="mailto:${D.email}" class="contact-link">✉ ${D.email}</a><a href="tel:${D.phone.replace(/-/g,'')}" class="contact-link">☎ ${D.phone}</a>`;
document.getElementById('contact-footer-name').textContent=`${D.name_en} ｜ ${D.name_zh}`;

window.toggleSkill=(block)=>{ const isOpen=block.classList.contains('open'); document.querySelectorAll('.skill-block.open').forEach(b=>b.classList.remove('open')); if(!isOpen)block.classList.add('open'); };
window.toggleProj=(card)=>{ const body=card.querySelector('.proj-body'); const isOpen=body.classList.contains('open'); document.querySelectorAll('.proj-body.open').forEach(b=>b.classList.remove('open')); if(!isOpen)body.classList.add('open'); };

const obs=new IntersectionObserver(es=>es.forEach((e,i)=>{ if(e.isIntersecting) setTimeout(()=>e.target.classList.add('visible'),i*50); }),{threshold:0.05});
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));

const cur=document.getElementById('cursor'),ring=document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx-7+'px';cur.style.top=my-7+'px';});
(function a(){rx+=(mx-rx)*0.1;ry+=(my-ry)*0.1;ring.style.left=rx-18+'px';ring.style.top=ry-18+'px';requestAnimationFrame(a);})();
</script>
</body>
</html>
